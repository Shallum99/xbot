version: 2

project_name: xbot

builds:
  - main: .
    binary: xbot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^wip:"
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: Shallum99
      name: homebrew-tap
    homepage: https://github.com/Shallum99/xbot
    description: AI-powered bug fix bot triggered from X
    license: MIT
    install: |
      bin.install "xbot"

release:
  github:
    owner: Shallum99
    name: xbot
